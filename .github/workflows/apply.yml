name: Apply Database Scripts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  migrate:
    name: Run Flyway Migrations
    needs: validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Flyway migrations
        uses: docker://flyway/flyway:10
        with:
          args: -url=${{ secrets.DB_URL }} -user=${{ secrets.DB_USER }} -password=${{ secrets.DB_PASSWORD }} -locations=filesystem:./migrations migrate
