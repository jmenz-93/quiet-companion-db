name: Apply Database Scripts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_NAME: ${{ secrets.DB_NAME }}

jobs:
  migrate:
    name: Run Flyway Migrations
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Flyway migrations
        uses: docker://flyway/flyway:12.6.2
        env:
          DB_URL: ${{ secrets.DB_URL }}
        with:
          args: migrate

  dbt-build:
    name: Build Models and Test Data
    needs: migrate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt and Elementary
        run: |
          pip install dbt-postgres
          pip install 'elementary-data[postgres]'

      - name: Install dbt dependencies
        run: dbt deps --profiles-dir .

      - name: Build dbt project
        run: dbt build --target prod --profiles-dir .

      - name: Generate and Send Elementary Report
        if: always()
        run: |
          edr send-report \
            --slack-token ${{ secrets.SLACK_TOKEN }} \
            --slack-channel-name ${{ secrets.SLACK_CHANNEL_NAME }} \
            --profiles-dir . \
            --project-dir .

