name: Apply Flyway and Run dbt

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [run-dbt]
    
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DB_PORT: ${{ secrets.DB_PORT }}
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_NAME: ${{ secrets.DB_NAME }}

jobs:
  migrate:
    name: Run Flyway Migrations
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run Flyway migrations
        uses: docker://flyway/flyway:12.6.2
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          args: -configFiles=migrations/flyway.conf -locations=filesystem:./migrations/scripts migrate


  dbt-build:
    name: Build dbt Models
    needs: migrate
    if: |
      always() && 
      needs.migrate.result != 'failure' && 
      needs.migrate.result != 'cancelled'
  
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install -r requirements.txt

      - name: Install dbt dependencies
        run: dbt deps --project-dir dbt --profiles-dir dbt
        

      - name: Build dbt project
        run: |
          dbt build --target prod --project-dir dbt --profiles-dir dbt

  elementary-report:
    name: Send Elementary Report
    needs: dbt-build
    if: |
      always() &&
      needs.dbt-build.result == 'success' &&
      github.event_name == 'repository_dispatch' &&
      github.event.action == 'run-dbt'
      
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt and Elementary
        run: pip install -r requirements.txt

      - name: Install dbt dependencies
        run: dbt deps --project-dir dbt --profiles-dir dbt

      - name: Run Elementary models
        run: |
          dbt run --select elementary --target prod --project-dir dbt --profiles-dir dbt

      - name: Generate and Send Elementary Report
        if: always()
        run: |
          edr send-report \
            --slack-token ${{ secrets.SLACK_TOKEN }} \
            --slack-channel-name ${{ secrets.SLACK_CHANNEL_NAME }} \
            --profiles-dir dbt \
            --project-dir dbt   

