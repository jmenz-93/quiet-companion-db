name: Code Quality

on:
  push:
    branches-ignore:
      - main  # Runs immediately on any branch push, but ignores merges into main
  workflow_call:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-dbt:
    name: Lint and Compile Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SQLFluff and dbt
        run: pip install sqlfluff dbt-postgres

      - name: Run SQLFluff lint
        run: sqlfluff lint migrations/

      - name: Verify dbt dependencies
        run: dbt deps

      - name: Compile dbt models
        run: dbt compile
