name: Code Quality

on:
  push:
    branches-ignore:
      - main  # Runs immediately on any branch push, but ignores merges into main
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DB_PORT: ${{ secrets.DB_PORT }}
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_NAME: ${{ secrets.DB_NAME }}

jobs:
  lint-and-dbt:
    name: Lint and Compile Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SQLFluff and dbt
        run: pip install sqlfluff dbt-postgres

      - name: Run SQLFluff lint
        run: sqlfluff lint migrations/

      - name: Install dbt dependencies
        run: dbt deps --project-dir dbt --profiles-dir dbt
        
      - name: Parse dbt project
        run: dbt parse --project-dir dbt --profiles-dir dbt
