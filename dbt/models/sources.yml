version: 2

sources:
  - name: quiet_companion
    schema: raw
    tables:
      - name: raw_accounts
        description: "Raw accounts data"
        columns:
          - name: effective_date
            description: "Date the record was generated in the source system"
            data_tests:
              - not_null:
                  config:
                    severity: warn
          - name: account_number
            description: "Unique identifier for the account"
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: ssn
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: account_status
            data_tests:
              - not_null
          - name: date_opened
            data_tests:
              - not_null
      - name: raw_client
        description: "Raw client information"
        columns:
          - name: effective_date
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: ssn
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: first_name
            data_tests:
              - not_null
          - name: last_name
            data_tests:
              - not_null
          - name: date_of_birth
            data_tests:
              - not_null
      - name: raw_client_address
        description: "Raw client address data"
        columns:
          - name: effective_date
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: ssn
            data_tests:
              - not_null:
                  config:
                    severity: error             
          - name: address_line_1
            data_tests:
              - not_null
          - name: city
            data_tests:
              - not_null
          - name: state
            data_tests:
              - not_null
          - name: zip_code
            data_tests:
              - not_null
      - name: raw_trades
        description: "Raw trade data"
        columns:
          - name: effective_date
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: trade_id
            data_tests:
              - not_null
              - unique
          - name: account_number
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: ssn
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: advisor_code
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: trade_date
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: settlement_date
            data_tests:
              - not_null:
                  config:
                    severity: error
          - name: quantity
            data_tests:
              - not_null
          - name: price
            data_tests:
              - not_null